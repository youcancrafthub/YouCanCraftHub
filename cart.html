<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart | YouCanCraftHub</title>

<link rel="stylesheet" href="css/main.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

.cart-container{
max-width:1100px;
margin:50px auto;
padding:20px;
}

.cart-item{
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.cart-left{
display:flex;
align-items:center;
gap:20px;
}

.cart-left img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
}

.qty-box button{
width:35px;
height:35px;
font-size:18px;
cursor:pointer;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.summary{
margin-top:30px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
text-align:right;
}

.checkout-btn{
margin-top:20px;
background:#6C3EB8;
color:white;
padding:15px 30px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.empty{
text-align:center;
padding:100px;
font-size:22px;
}

</style>

</head>

<body>

<header>

<h1 style="padding:20px;color:#6C3EB8;">
🛒 Your Shopping Cart
</h1>

</header>

<div class="cart-container">

<div id="cartItems"></div>

<div class="summary">

<h2>

Total :
₹<span id="totalPrice">0</span>

</h2>

<button class="checkout-btn"

onclick="location.href='checkout.html'">

Proceed to Checkout

</button>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart(){

const container=document.getElementById("cartItems");

container.innerHTML="";

let total=0;

if(cart.length==0){

container.innerHTML=`

<div class="empty">

Your cart is empty 😔

<br><br>

<a href="index.html">

Continue Shopping

</a>

</div>

`;

document.getElementById("totalPrice").innerText=0;

return;

}

cart.forEach((item,index)=>{

total += item.price * item.quantity;

container.innerHTML += `

<div class="cart-item">

<div class="cart-left">

<img src="${item.image}">

<div>

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</div>

</div>

<div class="qty-box">

<button onclick="decrease(${index})">-</button>

<b>${item.quantity}</b>

<button onclick="increase(${index})">+</button>

</div>

<h3>

₹${item.price * item.quantity}

</h3>

<button

class="remove-btn"

onclick="removeItem(${index})">

Remove

</button>

</div>

`;

});

document.getElementById("totalPrice").innerText=total;

}

function increase(index){

cart[index].quantity++;

saveCart();

}

function decrease(index){

if(cart[index].quantity>1){

cart[index].quantity--;

}

saveCart();

}

function removeItem(index){

cart.splice(index,1);

saveCart();

}

function saveCart(){

localStorage.setItem("cart", JSON.stringify(cart));

    if (typeof updateCartCount === "function") {
        updateCartCount();
    }

    loadCart();

}

loadCart();

</script>
<script src="js/products.js"></script>
<script src="app.js"></script>
</body>

</html>
