<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | YouCanCraftHub</title>

<link rel="stylesheet" href="css/main.css">

<style>

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
display:grid;
grid-template-columns:1fr 400px;
gap:30px;
}

.box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

input,textarea{

width:100%;
padding:12px;
margin:10px 0 20px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;

}

textarea{
height:100px;
resize:none;
}

.order-item{

display:flex;
justify-content:space-between;
margin:15px 0;

}

.total{

font-size:22px;
font-weight:bold;
margin-top:20px;

}

.qr{

width:220px;
margin:auto;
display:block;

}

.pay-btn{

width:100%;
padding:15px;
background:#6C3EB8;
color:white;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;

}

.upi{

text-align:center;
font-size:18px;
font-weight:bold;
margin:20px 0;

}

@media(max-width:768px){

.container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<h1 style="text-align:center;color:#6C3EB8;margin-top:20px;">

Checkout

</h1>

<div class="container">

<div class="box">

<h2>Customer Details</h2>

<input
id="name"
placeholder="Full Name">

<input
id="phone"
placeholder="Mobile Number">

<textarea
id="address"
placeholder="Delivery Address"></textarea>

<input
id="utr"
placeholder="Payment UTR Number">

</div>

<div class="box">

<h2>Your Order</h2>

<div id="orderSummary"></div>

<div class="total">

Total : ₹<span id="total">0</span>

</div>

<hr><br>

<h3 align="center">

Scan & Pay

</h3>

<img
src="images/qr.png"
class="qr">

<div class="upi">

UPI ID

<br>

yourupi@okaxis

</div>

<button

class="pay-btn"

onclick="confirmOrder()">

Confirm Order

</button>

</div>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart")) || [];

let total=0;

const summary=document.getElementById("orderSummary");

cart.forEach(item=>{

total+=item.price*item.quantity;

summary.innerHTML+=`

<div class="order-item">

<span>

${item.name}

x ${item.quantity}

</span>

<span>

₹${item.price*item.quantity}

</span>

</div>

`;

});

document.getElementById("total").innerText=total;

function confirmOrder(){

const name=document.getElementById("name").value;

const phone=document.getElementById("phone").value;

const address=document.getElementById("address").value;

const utr=document.getElementById("utr").value;

if(name==""||phone==""||address==""||utr==""){

alert("Please fill all details");

return;

}

alert("Order Submitted Successfully!\n\nNext step: Save to Google Sheets.");

}

</script>

</body>

</html>
