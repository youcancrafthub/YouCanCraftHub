<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | YouCanCraftHub</title>

<link rel="stylesheet" href="css/main.css">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("x4cEjJXhTFavFqvCj");
</script>

<style>

body{
    margin:0;
    font-family:Poppins,Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
    display:grid;
    grid-template-columns:1fr 400px;
    gap:30px;
}

.box{
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#6C3EB8;
    margin-top:30px;
}

h2{
    margin-top:0;
}

input,textarea{

    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin:10px 0 20px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;

}

textarea{
    height:100px;
    resize:none;
}

.order-item{

    display:flex;
    justify-content:space-between;
    margin:15px 0;
    border-bottom:1px solid #eee;
    padding-bottom:10px;

}

.total{

    font-size:22px;
    font-weight:bold;
    margin-top:20px;

}

.qr{

    width:220px;
    display:block;
    margin:20px auto;

}

.upi{

    text-align:center;
    font-size:18px;
    font-weight:bold;
    margin-bottom:20px;

}

.pay-btn{

    width:100%;
    padding:15px;
    background:#6C3EB8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;

}

.pay-btn:hover{

    background:#5B21B6;

}

.back-btn{

    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#6C3EB8;
    font-weight:bold;

}

@media(max-width:768px){

.container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<h1>Secure Checkout</h1>

<div class="container">

<div class="box">

<h2>Customer Details</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="tel"
id="phone"
placeholder="Mobile Number">

<textarea
id="address"
placeholder="Delivery Address"></textarea>

<input
type="text"
id="utr"
placeholder="Payment UTR Number">

</div>

<div class="box">

<h2>Your Order</h2>

<div id="orderSummary">

</div>

<div class="total">

Total : ₹<span id="total">0</span>

</div>

<hr>

<h3 style="text-align:center;">
Scan & Pay
</h3>

<img
src="images/qr.png"
class="qr"
alt="UPI QR Code">

<div class="upi">

UPI ID

<br><br>

<b>9962079811@hdfcbank</b>

</div>

<p style="text-align:center;font-size:14px;color:#666;">

After completing the payment, enter the UTR Number on the left and click
<b>Confirm Order</b>.

</p>

<button
class="pay-btn"
onclick="confirmOrder()">

Confirm Order

</button>

<br><br>

<a
href="cart.html"
class="back-btn">

← Back to Cart

</a>

</div>

</div>

<script>

const SERVICE_ID="service_9j52h4z";
const TEMPLATE_ID="template_lzimfms";

let cart=JSON.parse(localStorage.getItem("cart")) || [];

let total=0;

const summary=document.getElementById("orderSummary");

cart.forEach(item=>{

total+=item.price*item.quantity;

summary.innerHTML+=`

<div class="order-item">

<div>

<b>${item.name}</b>

<br>

Qty : ${item.quantity}

</div>

<div>

₹${item.price*item.quantity}

</div>

</div>

`;

});

document.getElementById("total").innerText=total;

  function confirmOrder(){

const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();
const address=document.getElementById("address").value.trim();
const utr=document.getElementById("utr").value.trim();

if(cart.length===0){
    alert("Your cart is empty.");
    return;
}

if(name==="" || phone==="" || address==="" || utr===""){
    alert("Please fill all the details.");
    return;
}

let products="";

cart.forEach(item=>{
    products += `${item.name} x ${item.quantity} - ₹${item.price * item.quantity}\n`;
});

const orderNo="YCH-"+Date.now();

const btn=document.querySelector(".pay-btn");
btn.disabled=true;
btn.innerHTML="Submitting Order...";

emailjs.send(
SERVICE_ID,
TEMPLATE_ID,
{
order_no:orderNo,
name:name,
phone:phone,
address:address,
products:products,
total:total,
utr:utr
}
)
.then(function(){

alert(
"🎉 Order Placed Successfully!\n\nOrder Number: "
+ orderNo +
"\n\nWe have received your order."
);

localStorage.removeItem("cart");

window.location.href="index.html";

})
.catch(function(error){

console.log(error);

alert("Unable to send your order.\nPlease try again.");

btn.disabled=false;
btn.innerHTML="Confirm Order";

});

}

</script>

</body>

</html>
